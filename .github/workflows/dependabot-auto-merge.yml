name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge dependabot PRs
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'app/dependabot'

    steps:
      - name: Fetch dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve patch and minor updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr review "$PR_URL" --approve --body "Auto-approved: ${{ steps.metadata.outputs.update-type }} update to \`${{ steps.metadata.outputs.dependency-names }}\`"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for core CI checks to pass
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          set -euo pipefail

          timeout_seconds=1800
          interval_seconds=15
          elapsed=0

          core_checks=(
            "Lint and Format"
            "Type Check"
            "Test (Python 3.11)"
            "Test (Python 3.12)"
            "Test (Python 3.13)"
            "Backtest Parity Gate"
            "Performance Regression"
          )

          while true; do
            checks_json="$(gh pr checks "$PR_URL" --json name,bucket,workflow)"
            missing=0
            pending=0
            failed=0

            for check_name in "${core_checks[@]}"; do
              bucket="$(jq -r --arg name "$check_name" '.[] | select(.workflow == "CI" and .name == $name) | .bucket' <<<"$checks_json")"

              if [[ -z "$bucket" ]]; then
                missing=1
                continue
              fi

              if [[ "$bucket" == "pending" ]]; then
                pending=1
              elif [[ "$bucket" != "pass" ]]; then
                failed=1
                echo "Core CI check '$check_name' status is '$bucket'"
              fi
            done

            if [[ "$failed" -eq 1 ]]; then
              echo "One or more core CI checks failed; not enabling auto-merge."
              exit 1
            fi

            if [[ "$missing" -eq 0 && "$pending" -eq 0 ]]; then
              echo "All core CI checks passed."
              break
            fi

            if (( elapsed >= timeout_seconds )); then
              echo "Timed out waiting for core CI checks to complete."
              exit 1
            fi

            sleep "$interval_seconds"
            elapsed=$((elapsed + interval_seconds))
          done
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch and minor updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge "$PR_URL" --auto --squash
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update branch if behind after enabling auto-merge
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          merge_state="$(gh pr view "$PR_URL" --json mergeStateStatus --jq '.mergeStateStatus')"
          if [[ "$merge_state" == "BEHIND" ]]; then
            gh pr update-branch "$PR_URL" --rebase
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label major updates for manual review
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: gh pr edit "$PR_URL" --add-label "major-update"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
