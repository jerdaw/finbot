name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge dependabot PRs
    runs-on: ubuntu-latest
    if: |
      (
        github.event.pull_request.user.login == 'dependabot[bot]' ||
        github.event.pull_request.user.login == 'app/dependabot'
      ) &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/')

    steps:
      - name: Fetch dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-commit-verification: true

      - name: Auto-approve patch and minor updates
        if: |
          steps.metadata.outcome == 'success' &&
          (
            steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.metadata.outputs.update-type == 'version-update:semver-minor'
          )
        run: |
          gh pr review "$PR_URL" --approve --body "Auto-approved: ${{ steps.metadata.outputs.update-type }} update to \`${{ steps.metadata.outputs.dependency-names }}\`"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch and minor updates
        if: |
          steps.metadata.outcome == 'success' &&
          secrets.DEPENDABOT_AUTOMERGE_PAT != '' &&
          (
            steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.metadata.outputs.update-type == 'version-update:semver-minor'
          )
        run: |
          gh pr merge "$PR_URL" \
            --auto \
            --squash \
            --subject "${{ github.event.pull_request.title }}" \
            --body "Auto-merged after required CI checks passed."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.DEPENDABOT_AUTOMERGE_PAT }}

      - name: Update branch if behind after enabling auto-merge
        if: |
          steps.metadata.outcome == 'success' &&
          secrets.DEPENDABOT_AUTOMERGE_PAT != '' &&
          (
            steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.metadata.outputs.update-type == 'version-update:semver-minor'
          )
        run: |
          merge_state="$(gh pr view "$PR_URL" --json mergeStateStatus --jq '.mergeStateStatus')"
          if [[ "$merge_state" == "BEHIND" ]]; then
            gh pr update-branch "$PR_URL"
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.DEPENDABOT_AUTOMERGE_PAT }}

      - name: Label major updates for manual review
        if: |
          steps.metadata.outcome == 'success' &&
          steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: gh pr edit "$PR_URL" --add-label "major-update"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
