name: Docker Security Monitor

on:
  schedule:
    # Weekly on Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: docker-security-monitor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monitor:
    name: Scheduled Docker Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build CLI Docker image
        id: build_cli_image
        continue-on-error: true
        run: docker build -t finbot-cli:security-${{ github.sha }} -f Dockerfile .

      - name: Build API Docker image
        id: build_api_image
        continue-on-error: true
        run: docker build -t finbot-api:security-${{ github.sha }} -f web/Dockerfile.backend .

      - name: Run Trivy vulnerability scanner on CLI image (SARIF)
        if: steps.build_cli_image.outcome == 'success'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.34.1
        with:
          image-ref: "finbot-cli:security-${{ github.sha }}"
          format: "sarif"
          output: "trivy-results-cli.sarif"
          pkg-types: "os,library"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
          limit-severities-for-sarif: true
          trivyignores: ".trivyignore.example"

      - name: Run Trivy vulnerability scanner on CLI image (JSON)
        if: steps.build_cli_image.outcome == 'success'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.34.1
        with:
          image-ref: "finbot-cli:security-${{ github.sha }}"
          format: "json"
          output: "trivy-report-cli.json"
          pkg-types: "os,library"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
          trivyignores: ".trivyignore.example"

      - name: Run Trivy vulnerability scanner on API image (SARIF)
        if: steps.build_api_image.outcome == 'success'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.34.1
        with:
          image-ref: "finbot-api:security-${{ github.sha }}"
          format: "sarif"
          output: "trivy-results-api.sarif"
          pkg-types: "os,library"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
          limit-severities-for-sarif: true
          trivyignores: ".trivyignore.example"

      - name: Run Trivy vulnerability scanner on API image (JSON)
        if: steps.build_api_image.outcome == 'success'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.34.1
        with:
          image-ref: "finbot-api:security-${{ github.sha }}"
          format: "json"
          output: "trivy-report-api.json"
          pkg-types: "os,library"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
          trivyignores: ".trivyignore.example"

      - name: Summarize vulnerability counts and findings
        id: vuln_summary
        env:
          CLI_BUILD_OUTCOME: ${{ steps.build_cli_image.outcome }}
          API_BUILD_OUTCOME: ${{ steps.build_api_image.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          DETECTED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          summarize_image() {
            local build_outcome="$1"
            local report_file="$2"
            local critical_var_name="$3"
            local high_var_name="$4"
            local status_var_name="$5"

            if [[ "$build_outcome" == "success" ]]; then
              local critical_count
              local high_count
              critical_count="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' "$report_file")"
              high_count="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' "$report_file")"
              printf -v "$critical_var_name" '%s' "$critical_count"
              printf -v "$high_var_name" '%s' "$high_count"
              printf -v "$status_var_name" '%s' "scanned"
            else
              printf -v "$critical_var_name" '%s' "0"
              printf -v "$high_var_name" '%s' "0"
              printf -v "$status_var_name" '%s' "build_failed"
            fi
          }

          append_findings() {
            local image_name="$1"
            local status="$2"
            local report_file="$3"
            local critical_count="$4"
            local high_count="$5"

            {
              echo "### ${image_name} Image"
              echo "- Scan status: ${status}"
              echo "- Critical: ${critical_count}"
              echo "- High: ${high_count}"
            } >> docker-security-summary.md

            if [[ "$status" == "build_failed" ]]; then
              echo "- Findings: image build failed before scanning" >> docker-security-summary.md
            elif (( critical_count > 0 || high_count > 0 )); then
              jq -r '
                .Results[]?.Vulnerabilities[]?
                | select(.Severity == "CRITICAL" or .Severity == "HIGH")
                | "- `\(.PkgName)` \(.InstalledVersion) -> \(.FixedVersion // "no fix published") (\(.Severity), \(.VulnerabilityID))"
              ' "$report_file" >> docker-security-summary.md
            else
              echo "- Findings: none" >> docker-security-summary.md
            fi

            echo "" >> docker-security-summary.md
          }

          summarize_image "$CLI_BUILD_OUTCOME" "trivy-report-cli.json" cli_critical_count cli_high_count cli_scan_status
          summarize_image "$API_BUILD_OUTCOME" "trivy-report-api.json" api_critical_count api_high_count api_scan_status

          critical_count="$((cli_critical_count + api_critical_count))"
          high_count="$((cli_high_count + api_high_count))"
          any_build_failed="false"

          if [[ "$cli_scan_status" == "build_failed" || "$api_scan_status" == "build_failed" ]]; then
            any_build_failed="true"
          fi

          {
            echo "Automated scheduled Docker security scan detected vulnerabilities."
            echo ""
            echo "- Detected at: ${DETECTED_AT}"
            echo "- Workflow run: ${RUN_URL}"
            echo "- Critical: ${critical_count}"
            echo "- High: ${high_count}"
            echo ""
          } > docker-security-summary.md

          append_findings "CLI" "$cli_scan_status" "trivy-report-cli.json" "$cli_critical_count" "$cli_high_count"
          append_findings "API" "$api_scan_status" "trivy-report-api.json" "$api_critical_count" "$api_high_count"

          echo "critical_count=${critical_count}" >> "$GITHUB_OUTPUT"
          echo "high_count=${high_count}" >> "$GITHUB_OUTPUT"
          echo "cli_scan_status=${cli_scan_status}" >> "$GITHUB_OUTPUT"
          echo "api_scan_status=${api_scan_status}" >> "$GITHUB_OUTPUT"
          echo "any_build_failed=${any_build_failed}" >> "$GITHUB_OUTPUT"
          echo "detected_at=${DETECTED_AT}" >> "$GITHUB_OUTPUT"

          {
            echo "### Scheduled Docker Security Summary"
            echo "- CLI scan status: ${cli_scan_status}"
            echo "- API scan status: ${api_scan_status}"
            echo "- Critical: ${critical_count}"
            echo "- High: ${high_count}"
            echo ""
            cat docker-security-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CLI Trivy results to GitHub Security tab
        if: always() && steps.build_cli_image.outcome == 'success'
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: "trivy-results-cli.sarif"
          category: "trivy-cli"

      - name: Upload API Trivy results to GitHub Security tab
        if: always() && steps.build_api_image.outcome == 'success'
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: "trivy-results-api.sarif"
          category: "trivy-api"

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: docker-security-monitor-report
          path: |
            trivy-results-cli.sarif
            trivy-report-cli.json
            trivy-results-api.sarif
            trivy-report-api.json
            docker-security-summary.md
          retention-days: 30

      - name: Fail when image build fails or HIGH/CRITICAL vulnerabilities are present
        env:
          CRITICAL_COUNT: ${{ steps.vuln_summary.outputs.critical_count }}
          HIGH_COUNT: ${{ steps.vuln_summary.outputs.high_count }}
          ANY_BUILD_FAILED: ${{ steps.vuln_summary.outputs.any_build_failed }}
        run: |
          set -euo pipefail
          if [[ "$ANY_BUILD_FAILED" == "true" ]]; then
            echo "At least one Docker image build failed; security scan could not complete."
            exit 1
          fi
          if (( CRITICAL_COUNT > 0 || HIGH_COUNT > 0 )); then
            echo "Detected ${CRITICAL_COUNT} CRITICAL and ${HIGH_COUNT} HIGH vulnerabilities."
            exit 1
          fi
