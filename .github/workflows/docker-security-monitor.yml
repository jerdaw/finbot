name: Docker Security Monitor

on:
  schedule:
    # Weekly on Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

concurrency:
  group: docker-security-monitor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monitor:
    name: Scheduled Docker Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build Docker image
        id: build_image
        continue-on-error: true
        run: docker build -t finbot:security-${{ github.sha }} .

      - name: Run Trivy vulnerability scanner on image (SARIF)
        if: steps.build_image.outcome == 'success'
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.1
        with:
          image-ref: "finbot:security-${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "0"
          ignore-unfixed: true
          trivyignores: ".trivyignore.example"

      - name: Run Trivy vulnerability scanner on image (JSON)
        if: steps.build_image.outcome == 'success'
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.1
        with:
          image-ref: "finbot:security-${{ github.sha }}"
          format: "json"
          output: "trivy-report.json"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
          trivyignores: ".trivyignore.example"

      - name: Summarize vulnerability counts
        id: vuln_summary
        env:
          BUILD_OUTCOME: ${{ steps.build_image.outcome }}
        run: |
          set -euo pipefail

          if [[ "$BUILD_OUTCOME" == "success" ]]; then
            critical_count="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-report.json)"
            high_count="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-report.json)"
            scan_status="scanned"
          else
            critical_count="0"
            high_count="0"
            scan_status="build_failed"
          fi

          echo "critical_count=${critical_count}" >> "$GITHUB_OUTPUT"
          echo "high_count=${high_count}" >> "$GITHUB_OUTPUT"
          echo "scan_status=${scan_status}" >> "$GITHUB_OUTPUT"

          {
            echo "### Scheduled Docker Security Summary"
            echo "- Scan status: ${scan_status}"
            echo "- Critical: ${critical_count}"
            echo "- High: ${high_count}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Trivy results to GitHub Security tab
        if: always() && steps.build_image.outcome == 'success'
        uses: github/codeql-action/upload-sarif@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3.32.5
        with:
          sarif_file: "trivy-results.sarif"

      - name: Upload security artifacts
        if: always() && steps.build_image.outcome == 'success'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: docker-security-monitor-report
          path: |
            trivy-results.sarif
            trivy-report.json
          retention-days: 30

      - name: Fail when CRITICAL or HIGH vulnerabilities are present
        env:
          BUILD_OUTCOME: ${{ steps.build_image.outcome }}
          CRITICAL_COUNT: ${{ steps.vuln_summary.outputs.critical_count }}
          HIGH_COUNT: ${{ steps.vuln_summary.outputs.high_count }}
        run: |
          set -euo pipefail
          if [[ "$BUILD_OUTCOME" != "success" ]]; then
            echo "Docker image build failed; security scan could not run."
            exit 1
          fi
          if (( CRITICAL_COUNT > 0 || HIGH_COUNT > 0 )); then
            echo "Detected ${CRITICAL_COUNT} CRITICAL and ${HIGH_COUNT} HIGH vulnerabilities."
            exit 1
          fi

      - name: Open, reopen, or update Docker security issue on failure
        if: failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          SCAN_STATUS: ${{ steps.vuln_summary.outputs.scan_status || 'unknown' }}
          CRITICAL_COUNT: ${{ steps.vuln_summary.outputs.critical_count || '0' }}
          HIGH_COUNT: ${{ steps.vuln_summary.outputs.high_count || '0' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title = "⚠️ Docker security scan detected HIGH/CRITICAL vulnerabilities";
            const timestamp = new Date().toISOString();
            const body = [
              "Automated scheduled Docker security scan detected vulnerabilities.",
              "",
              `- Detected at: ${timestamp}`,
              `- Scan status: ${process.env.SCAN_STATUS}`,
              `- Critical: ${process.env.CRITICAL_COUNT}`,
              `- High: ${process.env.HIGH_COUNT}`,
              `- Workflow run: ${process.env.RUN_URL}`,
              "",
              "This issue is managed by workflow automation and is updated in place."
            ].join("\n");

            const requiredLabels = [
              { name: "security", color: "b60205", description: "Security-related findings and hardening work" },
              { name: "automated", color: "0e8a16", description: "Opened or updated by GitHub Actions" },
              { name: "docker-security", color: "5319e7", description: "Container image vulnerability tracking" }
            ];

            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                } else {
                  throw error;
                }
              }
            }

            const { data: allIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100
            });

            const existing = allIssues.find((issue) => issue.title === title && !issue.pull_request);
            const labels = requiredLabels.map((label) => label.name);

            if (existing) {
              if (existing.state === "open") {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  title,
                  body,
                  labels
                });
              } else {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: "open",
                  title,
                  body,
                  labels
                });
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `A failing scan was detected at ${timestamp}. Run: ${process.env.RUN_URL}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels
              });
            }

      - name: Close Docker security issue on success
        if: success()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title = "⚠️ Docker security scan detected HIGH/CRITICAL vulnerabilities";
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });

            const existing = openIssues.find((issue) => issue.title === title && !issue.pull_request);
            if (!existing) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `Scheduled Docker security scan passed. Closing issue. Run: ${process.env.RUN_URL}`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: "closed"
            });
