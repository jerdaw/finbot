name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'docs_site/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'docs_site/**'
      - '*.md'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check . --exclude notebooks/

      - name: Format check with ruff
        run: uv run ruff format --check . --exclude notebooks/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Type check with mypy
        run: uv run mypy finbot/

  docstring-coverage:
    name: Docstring Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check docstring coverage with interrogate
        run: uv run interrogate finbot/
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Security scan with bandit
        run: uv run --all-extras bandit -r finbot/ -ll
        continue-on-error: true

      - name: Vulnerability scan with pip-audit
        run: uv run --all-extras --with pip-audit pip-audit --local
        continue-on-error: true

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        env:
          DYNACONF_ENV: development
        run: uv run pytest tests/ -v --cov=finbot --cov-report=term-missing --cov-fail-under=60

      - name: Upload coverage reports
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  parity-gate:
    name: Backtest Parity Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run parity tests for golden strategies
        env:
          DYNACONF_ENV: development
        run: |
          echo "Running adapter parity gate for all golden strategies..."
          echo "GS-01: NoRebalance + SPY (buy-and-hold control)"
          uv run pytest tests/integration/test_backtest_parity_ab.py::TestGoldenStrategyParity::test_gs01_norebalance_spy -v
          echo ""
          echo "GS-02: DualMomentum + SPY/TLT (regime switching)"
          uv run pytest tests/integration/test_backtest_parity_ab.py::TestGoldenStrategyParity::test_gs02_dualmomentum_spy_tlt -v
          echo ""
          echo "GS-03: RiskParity + SPY/QQQ/TLT (multi-asset volatility weighting)"
          uv run pytest tests/integration/test_backtest_parity_ab.py::TestGoldenStrategyParity::test_gs03_riskparity_spy_qqq_tlt -v
          echo ""
          echo "✅ All parity gates passed - adapter output matches legacy path within tolerance"

  performance-regression:
    name: Performance Regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run performance benchmarks
        env:
          DYNACONF_ENV: development
        run: |
          echo "Running performance regression tests..."
          uv run python tests/performance/benchmark_runner.py --threshold 0.20

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: tests/performance/baseline.json
          retention-days: 30

  docker-security-scan:
    name: Docker Security Scan (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: cli
            dockerfile: Dockerfile
            tag: finbot-cli
          - name: api
            dockerfile: web/Dockerfile.backend
            tag: finbot-api

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          cache: false
          version: v0.69.3

      - name: Build Docker image
        run: docker build -t ${{ matrix.image.tag }}:${{ github.sha }} -f ${{ matrix.image.dockerfile }} .

      - name: Run Trivy vulnerability scanner on Dockerfile
        run: >
          trivy config
          --severity CRITICAL,HIGH,MEDIUM,LOW
          --exit-code 0
          --ignorefile .trivyignore.example
          ${{ matrix.image.dockerfile }}

      - name: Run Trivy vulnerability scanner on image
        run: >
          trivy image
          --scanners vuln
          --pkg-types library
          --format sarif
          --output trivy-results-${{ matrix.image.name }}.sarif
          --severity CRITICAL,HIGH
          --exit-code 1
          --ignore-unfixed
          --ignorefile .trivyignore.example
          ${{ matrix.image.tag }}:${{ github.sha }}

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: "trivy-results-${{ matrix.image.name }}.sarif"

      - name: Run Trivy vulnerability scanner for summary
        if: always()
        run: >
          trivy image
          --scanners vuln
          --pkg-types os,library
          --format table
          --severity CRITICAL,HIGH,MEDIUM,LOW
          --ignorefile .trivyignore.example
          ${{ matrix.image.tag }}:${{ github.sha }}

      - name: Generate detailed security report
        if: always()
        run: >
          trivy image
          --scanners vuln
          --pkg-types os,library
          --format json
          --output trivy-report-${{ matrix.image.name }}.json
          --severity CRITICAL,HIGH
          --ignore-unfixed
          --ignorefile .trivyignore.example
          ${{ matrix.image.tag }}:${{ github.sha }}

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-security-report-${{ matrix.image.name }}
          path: |
            trivy-results-${{ matrix.image.name }}.sarif
            trivy-report-${{ matrix.image.name }}.json
          retention-days: 30
