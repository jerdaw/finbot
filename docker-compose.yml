services:
  # Interactive CLI - run any finbot command
  finbot:
    build: .
    container_name: finbot
    volumes:
      - finbot-data:/app/finbot/data
    env_file:
      - path: finbot/config/.env
        required: false
    environment:
      - DYNACONF_ENV=${DYNACONF_ENV:-development}

  # Daily data update pipeline
  finbot-update:
    build: .
    container_name: finbot-update
    entrypoint: ["python", "scripts/update_daily.py"]
    command: []
    volumes:
      - finbot-data:/app/finbot/data
    env_file:
      - path: finbot/config/.env
        required: false
    environment:
      - DYNACONF_ENV=${DYNACONF_ENV:-development}

  # Streamlit web dashboard
  finbot-dashboard:
    build:
      context: .
      args:
        FINBOT_EXTRAS: dashboard
    container_name: finbot-dashboard
    entrypoint: ["python", "-m", "streamlit", "run", "finbot/dashboard/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    command: []
    ports:
      - "8501:8501"
    volumes:
      - finbot-data:/app/finbot/data
    env_file:
      - path: finbot/config/.env
        required: false
    environment:
      - DYNACONF_ENV=${DYNACONF_ENV:-development}

  # Data status check
  finbot-status:
    build: .
    container_name: finbot-status
    command: ["status"]
    volumes:
      - finbot-data:/app/finbot/data
    environment:
      - DYNACONF_ENV=${DYNACONF_ENV:-development}

  # FastAPI backend API
  finbot-api:
    build:
      context: .
      dockerfile: web/Dockerfile.backend
    container_name: finbot-api
    ports:
      - "8000:8000"
    volumes:
      - finbot-data:/app/finbot/data
    env_file:
      - path: finbot/config/.env
        required: false
    environment:
      - DYNACONF_ENV=${DYNACONF_ENV:-development}
      - FINBOT_API_CORS_ORIGINS=["http://localhost:3000"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data = json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/health')); raise SystemExit(0 if data.get('status') == 'ok' else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Next.js web frontend
  finbot-web:
    build:
      context: .
      dockerfile: web/Dockerfile.frontend
    container_name: finbot-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      finbot-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  finbot-data:
    name: finbot-data
